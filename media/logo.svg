<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fk-stroke { stroke: #1e40af; stroke-width: 10; stroke-linecap: round; }
      .fk-fill { fill: #1e40af; }
